name: npm Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish, usually a release tag like v1.0.0
        required: true
        type: string
      npm_tag:
        description: npm dist-tag to publish under
        required: false
        default: latest
        type: string
      dry_run:
        description: Run npm publish in dry-run mode without uploading
        required: false
        default: false
        type: boolean
      auth_method:
        description: Authentication method (oidc uses GitHub OIDC trusted publisher; manual_otp uses NPM_TOKEN secret + 2FA OTP)
        required: false
        default: oidc
        type: choice
        options:
          - oidc
          - manual_otp
      npm_otp:
        description: 2FA OTP code (required when auth_method=manual_otp). Code is masked in workflow logs.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac

      - name: Install dependencies
        run: mise run install

      - name: Validate npm package
        run: mise run npm-smoke

      - name: Check published version
        id: package
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node --print "require('./package.json').name")
          PACKAGE_VERSION=$(node --print "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure manual OTP auth
        if: github.event_name == 'workflow_dispatch' && inputs.auth_method == 'manual_otp'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_OTP: ${{ inputs.npm_otp }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::auth_method=manual_otp requires NPM_TOKEN to be configured as a secret on the production environment."
            exit 1
          fi
          if [ -z "${NPM_OTP}" ]; then
            echo "::error::auth_method=manual_otp requires npm_otp input to be supplied with the current 2FA OTP code."
            exit 1
          fi
          # Override actions/setup-node OIDC NODE_AUTH_TOKEN with the legacy token.
          echo "NODE_AUTH_TOKEN=${NPM_TOKEN}" >> "$GITHUB_ENV"
          echo "NPM_OTP_CONFIGURED=true" >> "$GITHUB_ENV"
          echo "Using manual_otp auth: NPM_TOKEN secret + 2FA OTP."

      - name: Dry run publish
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        env:
          NPM_DIST_TAG: ${{ inputs.npm_tag == 'latest' && 'dry-run' || inputs.npm_tag }}
        run: mise run npm-publish-dry-run

      - name: Publish package
        if: steps.package.outputs.published != 'true' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          NPM_OTP: ${{ env.NPM_OTP_CONFIGURED == 'true' && inputs.npm_otp || '' }}
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag || 'latest' }}"
          if [ -n "${NPM_OTP}" ]; then
            npm publish --access public --tag "${TAG}" --otp="${NPM_OTP}"
          else
            npm publish --access public --tag "${TAG}"
          fi

      - name: Publish scoped alias
        if: steps.package.outputs.published != 'true' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          ALIAS_SCOPE: "@echohello"
          NPM_OTP: ${{ env.NPM_OTP_CONFIGURED == 'true' && inputs.npm_otp || '' }}
        run: |
          set -euo pipefail
          VERSION=$(node --print "require('./package.json').version")
          ALIAS_NAME="${ALIAS_SCOPE}/skillet"
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag || 'latest' }}"

          # Skip if the alias version is already published
          if npm view "${ALIAS_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${ALIAS_NAME}@${VERSION} is already published; skipping."
            exit 0
          fi

          # Build a separate package.json in a clean dir for the scoped publish
          ALIAS_DIR="dist/npm-alias"
          rm -rf "$ALIAS_DIR"
          mkdir -p "$ALIAS_DIR"
          cp dist/npm/cli.js "$ALIAS_DIR/"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '${ALIAS_NAME}';
            fs.writeFileSync('${ALIAS_DIR}/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          cd "$ALIAS_DIR"
          if [ -n "${NPM_OTP}" ]; then
            npm publish --access public --tag "${TAG}" --otp="${NPM_OTP}"
          else
            npm publish --access public --tag "${TAG}"
          fi
